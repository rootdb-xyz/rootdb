name: 🐛 Bug Report
description: Something broken on rootdb.xyz?
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?

  - type: input
    id: url
    attributes:
      label: Page URL
      placeholder: https://rootdb.xyz/device/samsung/...

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop if you have any.