name: ❌ Wrong Data
description: A device, variant, or guide has incorrect information.
labels: ["data-fix", "high-priority"]
body:
  - type: input
    id: page
    attributes:
      label: Which page?
      placeholder: https://rootdb.xyz/device/samsung/galaxy-s/beyond1
    validations:
      required: true

  - type: textarea
    id: wrong
    attributes:
      label: What's wrong?
      placeholder: "SM-G973U1 is listed as locked but it's actually unlockable."
    validations:
      required: true

  - type: textarea
    id: correct
    attributes:
      label: What's correct?
      placeholder: "Provide sources — XDA thread, personal experience, etc."

  - type: textarea
    id: source
    attributes:
      label: Source / Proof
      placeholder: "Link to XDA, screenshot of unlocked bootloader, etc."